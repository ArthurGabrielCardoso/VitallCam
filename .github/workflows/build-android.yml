name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
  # Permite rodar manualmente pelo GitHub → Actions → "Run workflow"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necessário para commitar o APK de volta

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Token com permissão de push para commitar o APK gerado
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Instala o Gradle 8.6 sem precisar do gradle-wrapper.jar
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build debug APK
        working-directory: android-app
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: Copy APK to public/
        run: |
          APK_PATH=$(find android-app/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK encontrado: $APK_PATH"
          cp "$APK_PATH" public/vitallcam-android.apk
          echo "Tamanho: $(du -sh public/vitallcam-android.apk | cut -f1)"

      - name: Commit APK de volta ao repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/vitallcam-android.apk
          if git diff --staged --quiet; then
            echo "APK não mudou — nada para commitar"
          else
            git commit -m "chore: atualiza APK Android (build automático) [skip ci]"
            git push
          fi
