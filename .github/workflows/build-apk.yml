name: Build Android APK

env:
  main_project_module: app

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - 'public/assets/images/logo.png'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate mipmap icons from logo
        run: |
          # Usa SVG se existir, senão usa PNG
          LOGO="public/assets/images/logo.png"
          [ -f "public/logo.svg" ] && LOGO="public/logo.svg"
          [ -f "public/assets/images/logo.svg" ] && LOGO="public/assets/images/logo.svg"
          echo "Usando logo: $LOGO"
          for density in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            DIR="${density%%:*}"
            SIZE="${density##*:}"
            mkdir -p "android-app/app/src/main/res/mipmap-${DIR}"
            convert "$LOGO" \
              -resize "${SIZE}x${SIZE}" \
              -background none \
              -gravity center \
              -extent "${SIZE}x${SIZE}" \
              "android-app/app/src/main/res/mipmap-${DIR}/ic_launcher.png"
          done

      - name: Build APK debug
        working-directory: android-app
        run: gradle assembleDebug --no-daemon

      - name: Copy APK to public/
        run: |
          mkdir -p public
          cp android-app/${{ env.main_project_module }}/build/outputs/apk/debug/app-debug.apk public/vitallcam-android.apk

      - name: Commit APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/vitallcam-android.apk
          git diff --cached --quiet || git commit -m "chore: atualiza APK Android [skip ci]"
          git push
