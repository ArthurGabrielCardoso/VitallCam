name: Build Android APK

env:
  main_project_module: app

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
      - 'public/assets/images/icon.png'
      - 'public/assets/images/icon.svg'
      - 'public/assets/images/logo.png'
      - 'public/assets/images/logo.svg'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Build APK debug
        working-directory: android-app
        run: gradle assembleDebug --no-daemon

      - name: Copy APK to public/
        run: |
          mkdir -p public
          cp android-app/${{ env.main_project_module }}/build/outputs/apk/debug/app-debug.apk public/vitallcam-android.apk

      - name: Commit APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/vitallcam-android.apk
          git diff --cached --quiet || git commit -m "chore: atualiza APK Android [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main
