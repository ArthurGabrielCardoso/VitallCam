name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android-app
        run: gradle assembleDebug --no-daemon

      - name: Copy APK to public/
        run: |
          mkdir -p public
          cp android-app/app/build/outputs/apk/debug/app-debug.apk public/vitallcam-android.apk

      - name: Commit APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/vitallcam-android.apk
          git diff --cached --quiet || git commit -m "chore: atualiza APK Android [skip ci]"
          git push
